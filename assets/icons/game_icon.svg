<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="32" fill="#2a1506"/>
  
  <!-- Smoker body -->
  <rect x="120" y="220" width="272" height="120" rx="8" fill="#4a2c0a" stroke="#c47a2a" stroke-width="3"/>
  <rect x="120" y="220" width="272" height="30" rx="4" fill="#3a2008"/>
  
  <!-- Smoker door -->
  <rect x="180" y="260" width="100" height="60" rx="4" fill="#5a3a10" stroke="#c47a2a" stroke-width="2"/>
  <circle cx="230" cy="290" r="5" fill="#c47a2a"/>
  
  <!-- Firebox -->
  <rect x="80" y="250" width="50" height="80" rx="4" fill="#3a2008" stroke="#c47a2a" stroke-width="3"/>
  <rect x="85" y="260" width="40" height="40" rx="2" fill="#6b3a0a"/>
  
  <!-- Chimney -->
  <rect x="340" y="160" width="20" height="80" rx="3" fill="#4a2c0a" stroke="#c47a2a" stroke-width="2"/>
  <rect x="335" y="155" width="30" height="12" rx="3" fill="#5a3a10"/>
  
  <!-- Legs -->
  <rect x="140" y="340" width="8" height="40" rx="2" fill="#4a2c0a"/>
  <rect x="364" y="340" width="8" height="40" rx="2" fill="#4a2c0a"/>
  
  <!-- Smoke wisps -->
  <path d="M345 150 Q350 120 340 100 Q330 80 345 60" fill="none" stroke="#888" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M360 145 Q365 115 355 95 Q350 75 360 55" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Smoke & Fire text -->
  <text x="256" y="440" font-family="serif" font-size="36" font-weight="bold" fill="#c47a2a" text-anchor="middle">Smoke &amp; Fire</text>
  <text x="256" y="470" font-family="serif" font-size="16" fill="#a06020" text-anchor="middle">BBQ Master</text>
</svg>